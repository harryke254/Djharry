kind = "web"
previewPath = "/"
title = "DJ Mixtape Site"
version = "1.0.0"
id = "artifacts/dj-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23182

[services.development]
run = "pnpm --filter @workspace/dj-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dj-site", "run", "build" ]
publicDir = "artifacts/dj-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23182"
BASE_PATH = "/"
