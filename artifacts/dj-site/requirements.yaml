packages:
  "framer-motion": "For cinematic page transitions, reveal animations, and interactive hover states"
  "date-fns": "For formatting mixtape release dates in a human-readable format"
  "lucide-react": "For UI icons like play, pause, volume, edit, trash, and navigation"

images:
