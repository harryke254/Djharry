  - path: "artifacts/dj-site/public/images/default-cover.png"
    description: "Abstract vinyl record texture with neon glowing cyan and purple edges on dark background, sleek and modern"
    aspect_ratio: "1:1"
  - path: "artifacts/dj-site/public/images/dj-logo.png"
