openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DJ Mixtape API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: mixtapes
    description: Mixtape management
  - name: storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /mixtapes:
    get:
      operationId: listMixtapes
      tags: [mixtapes]
      summary: List all mixtapes
      description: Returns all published mixtapes ordered by release date
      parameters:
        - name: genre
          in: query
          required: false
          schema:
            type: string
          description: Filter by genre
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of mixtapes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MixtapeListResponse"
    post:
      operationId: createMixtape
      tags: [mixtapes]
      summary: Create a new mixtape
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMixtapeBody"
      responses:
        "201":
          description: Mixtape created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mixtape"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /mixtapes/{id}:
    get:
      operationId: getMixtape
      tags: [mixtapes]
      summary: Get a mixtape by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mixtape found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mixtape"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: updateMixtape
      tags: [mixtapes]
      summary: Update a mixtape
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMixtapeBody"
      responses:
        "200":
          description: Mixtape updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mixtape"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteMixtape
      tags: [mixtapes]
      summary: Delete a mixtape
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mixtape deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Mixtape:
      type: object
      required: [id, title, audioPath, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        coverImagePath:
          type: string
          nullable: true
        audioPath:
          type: string
        tracklistText:
          type: string
          nullable: true
        downloadCount:
          type: integer
          default: 0
        featured:
          type: boolean
          default: false
        releaseDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    MixtapeListResponse:
      type: object
      required: [mixtapes, total]
      properties:
        mixtapes:
          type: array
          items:
            $ref: "#/components/schemas/Mixtape"
        total:
          type: integer

    CreateMixtapeBody:
      type: object
      required: [title, audioPath]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        coverImagePath:
          type: string
          nullable: true
        audioPath:
          type: string
          minLength: 1
        tracklistText:
          type: string
          nullable: true
        featured:
          type: boolean
          default: false
        releaseDate:
          type: string
          format: date-time
          nullable: true

    UpdateMixtapeBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        coverImagePath:
          type: string
          nullable: true
        audioPath:
          type: string
          minLength: 1
        tracklistText:
          type: string
          nullable: true
        featured:
          type: boolean
        releaseDate:
          type: string
          format: date-time
          nullable: true

    DeleteResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
